server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: promobrain-backend
  datasource:
    url: jdbc:mysql://localhost:3306/promobrain?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: promobrain
    password: promobrain
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: promobrain
    password: promobrain
    connection-timeout: 2s

sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: false

promobrain:
  ai-service-url: http://localhost:8001
  qdrant-url: http://localhost:6333
  minio-endpoint: http://localhost:9000
