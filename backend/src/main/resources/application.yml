server:
  port: 8080

spring:
  application:
    name: promobrain-backend
  datasource:
    url: jdbc:mysql://localhost:3306/promobrain?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: promobrain
    password: promobrain
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: promobrain
    password: promobrain

sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: false

promobrain:
  ai-service-url: http://localhost:8001

