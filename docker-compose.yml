services:
  mysql:
    image: mysql:8.0
    container_name: promobrain-mysql
    environment:
      MYSQL_ROOT_PASSWORD: promobrain
      MYSQL_DATABASE: promobrain
      MYSQL_USER: promobrain
      MYSQL_PASSWORD: promobrain
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/demo_data.sql:/docker-entrypoint-initdb.d/02-demo-data.sql:ro

  redis:
    image: redis:7-alpine
    container_name: promobrain-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: promobrain-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: promobrain
      RABBITMQ_DEFAULT_PASS: promobrain
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: promobrain-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: promobrain
      MINIO_ROOT_PASSWORD: promobrain123
    ports:
      - "9000:9000"
      - "9001:9001"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: promobrain-qdrant
    ports:
      - "6333:6333"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: promobrain-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  prometheus:
    image: prom/prometheus:latest
    container_name: promobrain-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: promobrain-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: promobrain
    ports:
      - "3000:3000"
